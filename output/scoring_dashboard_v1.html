  .badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:100px;font-size:11px;font-weight:800}

<script type="text/babel">
const {useState,useMemo,useEffect} = React;
const {ResponsiveContainer,BarChart,Bar,XAxis,YAxis,Tooltip,Cell,LabelList,CartesianGrid} = Recharts;

/* ─── 더미 데이터 — 1-1반 21명 (데미안 독서 감상문 평가) ─── */
/* 만점 50점 = 루브릭 합 (구체성 15 + 분량 15 + 창의성 15 = 45) + 보너스 영역 (시연 단순화: total = rubrics 합) */
const STUDENTS = [
  {id:'10101', name:'김서윤', total:42, status:'완료',  rubrics:[15,15,12], questions:[10,8,7,9,8]},
  {id:'10102', name:'이준호', total:38, status:'완료',  rubrics:[10,15,13], questions:[9,8,5,9,7]},
  {id:'10103', name:'박지민', total:30, status:'완료',  rubrics:[15,10,5],  questions:[7,7,4,7,5]},
  {id:'10104', name:'최유진', total:45, status:'완료',  rubrics:[15,15,15], questions:[10,9,8,10,8]},
  {id:'10105', name:'정현우', total:35, status:'완료',  rubrics:[10,10,15], questions:[8,7,5,9,6]},
  {id:'10106', name:'한가람', total:33, status:'완료',  rubrics:[10,10,13], questions:[8,7,5,8,5]},
  {id:'10107', name:'오세훈', total:28, status:'완료',  rubrics:[10,8,10],  questions:[6,6,4,7,5]},
  {id:'10108', name:'한지우', total:40, status:'완료',  rubrics:[15,10,15], questions:[9,8,7,9,7]},
  {id:'10109', name:'권나리', total:36, status:'완료',  rubrics:[10,11,15], questions:[8,8,5,9,6]},
  {id:'10110', name:'이민재', total:25, status:'완료',  rubrics:[5,10,10],  questions:[5,6,3,6,5]},
  {id:'10111', name:'김도윤', total:43, status:'완료',  rubrics:[15,15,13], questions:[10,9,7,10,7]},
  {id:'10112', name:'박지유', total:38, status:'완료',  rubrics:[12,11,15], questions:[9,8,6,9,6]},
  {id:'10113', name:'장하늘', total:32, status:'완료',  rubrics:[10,10,12], questions:[7,7,5,8,5]},
  {id:'10114', name:'문서연', total:45, status:'완료',  rubrics:[15,15,15], questions:[10,9,8,10,8]},
  {id:'10115', name:'송지호', total:34, status:'완료',  rubrics:[12,10,12], questions:[8,7,5,8,6]},
  {id:'10116', name:'유나경', total:41, status:'완료',  rubrics:[14,12,15], questions:[9,9,7,9,7]},
  {id:'10117', name:'배수현', total:18, status:'완료',  rubrics:[5,5,8],    questions:[4,4,3,4,3]},
  {id:'10118', name:'홍시우', total:39, status:'완료',  rubrics:[12,12,15], questions:[9,8,6,9,7]},
  {id:'10119', name:'노유진', total:null, status:'미응시', rubrics:null, questions:null},
  {id:'10120', name:'전민호', total:null, status:'미제출', rubrics:null, questions:null},
  {id:'10121', name:'심지원', total:null, status:'미응시', rubrics:null, questions:null}
];

const MAX_TOTAL = 50;
const RUBRICS = [
  {idx:0, name:'작성 내용의 구체성', max:15},
  {idx:1, name:'작성 분량 수준',     max:15},
  {idx:2, name:'작성의 창의성',     max:15}
];
const QUESTIONS = [
  {idx:0, label:'문항 1', short:'줄거리 요약'},
  {idx:1, label:'문항 2', short:'인상 깊은 인물'},
  {idx:2, label:'문항 3', short:'갈등 구조 분석'},
  {idx:3, label:'문항 4', short:'작가 주제'},
  {idx:4, label:'문항 5', short:'삶에 적용'}
];

/* ─── 등급 산정 (만점 50 기준) ─── */
function gradeOf(total){
  if(total === null || total === undefined) return null;
  if(total >= 45) return 'A';
  if(total >= 35) return 'B';
  if(total >= 25) return 'C';
  if(total >= 15) return 'D';
  return 'F';
}
const GRADE_COLORS = {A:'#00AF3D', B:'#5E29D8', C:'#E07000', D:'#DB3E51', F:'#808080'};
const GRADE_RANGE  = {A:'45~50', B:'35~44', C:'25~34', D:'15~24', F:'0~14'};

/* ─── KPI 통계 계산 ─── */
function calcStats(){
  const completed = STUDENTS.filter(s => s.total !== null);
  const totalCount = STUDENTS.length;
  const completedCount = completed.length;
  const noShowCount = STUDENTS.filter(s => s.status === '미응시' || s.status === '미제출').length;
  const sum = completed.reduce((a,s)=>a + s.total, 0);
  const mean = completedCount > 0 ? sum/completedCount : 0;
  const variance = completedCount > 0
    ? completed.reduce((a,s)=>a + Math.pow(s.total - mean, 2), 0) / completedCount
    : 0;
  const sd = Math.sqrt(variance);
  const max = completed.length ? Math.max(...completed.map(s=>s.total)) : 0;
  const min = completed.length ? Math.min(...completed.map(s=>s.total)) : 0;
  return {totalCount, completedCount, noShowCount, mean, sd, max, min};
}

function calcGradeDist(){
  const dist = {A:0,B:0,C:0,D:0,F:0};
  STUDENTS.forEach(s=>{
    const g = gradeOf(s.total);
    if(g) dist[g]++;
  });
  return ['A','B','C','D','F'].map(g => ({grade:g, count:dist[g], range:GRADE_RANGE[g]}));
}

function calcRubricsAvg(){
  const completed = STUDENTS.filter(s => s.rubrics);
  return RUBRICS.map(r => {
    const sum = completed.reduce((a,s)=>a + s.rubrics[r.idx], 0);
    const avg = completed.length ? sum/completed.length : 0;
    return {name:r.name, avg:Number(avg.toFixed(1)), max:r.max, pct: avg/r.max};
  });
}

function calcQuestionsAvg(){
  const completed = STUDENTS.filter(s => s.questions);
  return QUESTIONS.map(q => {
    const sum = completed.reduce((a,s)=>a + s.questions[q.idx], 0);
    const avg = completed.length ? sum/completed.length : 0;
    return {label:q.label, short:q.short, avg:Number(avg.toFixed(1)), max:10, pct: avg/10};
  });
}

/* ─── 컴포넌트 ─── */
function App(){
  const stats = useMemo(()=>calcStats(), []);
  const meanGrade = gradeOf(Math.round(stats.mean));
  const progressPct = Math.round(stats.completedCount / stats.totalCount * 100);

  return (
    <>
      {/* KPI 카드 */}
      <div className="kpi-grid">
        <div className="kpi-card accent">
          <div className="kpi-label">채점 진행률</div>
          <div className="kpi-value">{stats.completedCount}<span className="unit">/ {stats.totalCount}명</span></div>
          <div className="kpi-sub"><strong>{progressPct}%</strong> 완료 · 미응시·미제출 {stats.noShowCount}명</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">학급 평균</div>
          <div className="kpi-value">{stats.mean.toFixed(1)}<span className="unit">/ {MAX_TOTAL}점</span></div>
          <div className="kpi-sub">평균 등급 <strong>{meanGrade}</strong> · 50점 만점</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">점수 편차 (표준편차)</div>
          <div className="kpi-value">{stats.sd.toFixed(1)}<span className="unit">점</span></div>
          <div className="kpi-sub">학생 간 점수 차이 — 클수록 분산도가 큼</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">최고 / 최저</div>
          <div className="kpi-value">{stats.max}<span className="unit">/ {stats.min}점</span></div>
          <div className="kpi-sub">점수 범위 <strong>{stats.max - stats.min}점</strong></div>
        </div>
      </div>

      {/* 차트 그리드 */}
      <div className="chart-grid">
        <ChartCard title="성취 등급 분포" icon="award" sub="A~F 학생 수">
          <DistributionChart/>
        </ChartCard>
        <ChartCard title="채점요소별 평균" icon="layers" sub="채점기준 3개 항목 (만점 15점)">
          <RubricsChart/>
        </ChartCard>
        <ChartCard title="문항별 평균 점수" icon="list-ordered" sub="문항 1~5 학급 평균 (만점 10점)" span2={true}>
          <QuestionsChart/>
        </ChartCard>
      </div>

      {/* 학생 점수표 */}
      <StudentTable/>
    </>
  );
}

function ChartCard({title, sub, span2, children}){
  return (
    <div className={"chart-card" + (span2 ? " span2" : "")}>
      <div className="chart-title">{title}</div>
      <div className="chart-sub">{sub}</div>
      {children}
    </div>
  );
}

function DistributionChart(){
  const data = useMemo(()=>calcGradeDist(), []);
  return (
    <>
      <ResponsiveContainer width="100%" height={220}>
        <BarChart data={data} margin={{top:16,right:8,left:-20,bottom:0}}>
          <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" vertical={false}/>
          <XAxis dataKey="grade" tick={{fontSize:14,fill:'#494949',fontWeight:700}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fontSize:12,fill:'#B3B3B3'}} axisLine={false} tickLine={false} allowDecimals={false}/>
          <Tooltip
            contentStyle={{fontSize:13,borderRadius:8,border:'1px solid #E6E6E6'}}
            formatter={(v,n,p)=>[`${v}명 (${p.payload.range}점)`, p.payload.grade + '등급']}
            labelFormatter={()=>''}
          />
          <Bar dataKey="count" radius={[6,6,0,0]} maxBarSize={56}>
            {data.map((d,i)=>(
              <Cell key={i} fill={GRADE_COLORS[d.grade]}/>
            ))}
            <LabelList dataKey="count" position="top" style={{fontSize:13,fontWeight:800,fill:'#333'}} formatter={v => v ? v + '명' : ''}/>
          </Bar>
        </BarChart>
      </ResponsiveContainer>
      <div className="chart-legend">
        {['A','B','C','D','F'].map(g=>(
          <div key={g} className="legend-dot">
            <div className="dot" style={{background:GRADE_COLORS[g]}}/>
            <span>{g} ({GRADE_RANGE[g]}점)</span>
          </div>
        ))}
      </div>
    </>
  );
}

function RubricsChart(){
  const data = useMemo(()=>calcRubricsAvg(), []);
  return (
    <>

function StudentTable(){
  const [sortKey, setSortKey] = useState('id');
  const [sortDir, setSortDir] = useState('asc');
  const [query, setQuery] = useState('');

  const sorted = useMemo(()=>{
    const filtered = STUDENTS.filter(s =>
      !query || s.name.includes(query) || s.id.includes(query)
    );
    const copy = [...filtered];
    copy.sort((a,b)=>{
      let av, bv;
      if(sortKey === 'id'){ av=a.id; bv=b.id; }
      else if(sortKey === 'name'){ av=a.name; bv=b.name; }
      else if(sortKey === 'total'){ av=a.total ?? -1; bv=b.total ?? -1; }
      else if(sortKey === 'grade'){ av=gradeOf(a.total) ?? 'Z'; bv=gradeOf(b.total) ?? 'Z'; }
      else { av=a.status; bv=b.status; }
      if(av < bv) return sortDir === 'asc' ? -1 : 1;
      if(av > bv) return sortDir === 'asc' ?  1 : -1;
      return 0;
    });
    return copy;
  }, [sortKey, sortDir, query]);

  function toggleSort(key){
    if(sortKey === key) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
  }

  function gotoStudent(s){
    if(s.status !== '완료') return;
    // 정현우(10105)는 v2 시안 페이지로, 나머지는 v1
    const file = s.id === '10105' ? 'scoring_student_v2.html' : 'scoring_student_v1.html';
    location.href = `${file}?id=${s.id}&name=${encodeURIComponent(s.name)}&from=scoring_dashboard_v1.html`;
  }

  function statusBadge(status){
    if(status === '완료') return <span className="badge b-done">완료</span>;
    if(status === '미응시') return <span className="badge b-no">미응시</span>;
    if(status === '미제출') return <span className="badge b-no">미제출</span>;
    return <span className="badge b-todo">{status}</span>;
  }

  function gradeBadge(total){
    const g = gradeOf(total);
    if(!g) return <span style={{color:'#B3B3B3',fontSize:13}}>—</span>;
    return <span className={`grade-badge g-${g}`}>{g}</span>;
  }

  function SortIndicator({k}){
    if(sortKey !== k) return <span style={{color:'#D0D0D0',marginLeft:4,fontSize:11}}>↕</span>;
    return <span style={{color:'#7E44FB',marginLeft:4,fontSize:11,fontWeight:800}}>{sortDir === 'asc' ? '↑' : '↓'}</span>;
  }

  return (
    <div className="stu-section">
      <div className="stu-section-head">
        <h3>학생별 점수 ({STUDENTS.length}명)</h3>
        <div className="stu-search">
          <i data-lucide="search" style={{width:14,height:14,color:'#B3B3B3'}}/>
          <input
            value={query}
            onChange={e=>setQuery(e.target.value)}
            placeholder="이름·학번 검색"
          />
        </div>
      </div>
      <table className="stu-table">
        <thead>
          <tr>
            <th style={{width:90}} onClick={()=>toggleSort('id')}>학번<SortIndicator k="id"/></th>
            <th style={{width:100}} onClick={()=>toggleSort('name')}>이름<SortIndicator k="name"/></th>
            <th style={{width:90}} onClick={()=>toggleSort('total')}>총점<SortIndicator k="total"/></th>
            <th style={{width:70}} onClick={()=>toggleSort('grade')}>등급<SortIndicator k="grade"/></th>
            <th style={{width:90}}>구체성</th>
            <th style={{width:90}}>분량</th>
            <th style={{width:90}}>창의성</th>
            <th style={{width:90}} onClick={()=>toggleSort('status')}>상태<SortIndicator k="status"/></th>
            <th style={{width:90}}>상세</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(s=>(
            <tr key={s.id} onClick={()=>gotoStudent(s)}>
              <td style={{color:'#494949',fontWeight:600}}>{s.id}</td>
              <td style={{color:'#222',fontWeight:700}}>{s.name}</td>
              <td style={{fontWeight:800,color:'#222'}}>{s.total !== null ? `${s.total}/${MAX_TOTAL}` : <span style={{color:'#B3B3B3'}}>—</span>}</td>
              <td>{gradeBadge(s.total)}</td>
              <td style={{color:s.rubrics ? '#494949' : '#B3B3B3'}}>{s.rubrics ? s.rubrics[0] : '—'}</td>
              <td style={{color:s.rubrics ? '#494949' : '#B3B3B3'}}>{s.rubrics ? s.rubrics[1] : '—'}</td>
              <td style={{color:s.rubrics ? '#494949' : '#B3B3B3'}}>{s.rubrics ? s.rubrics[2] : '—'}</td>
              <td>{statusBadge(s.status)}</td>
              <td>
                {s.status === '완료'
                  ? <span className="link" onClick={e=>{e.stopPropagation(); gotoStudent(s);}}>채점 보기 <i data-lucide="arrow-right" style={{width:12,height:12}}/></span>
                  : <span style={{color:'#B3B3B3',fontSize:13}}>—</span>}
              </td>
            </tr>
          ))}
          {sorted.length === 0 && (
            <tr><td colSpan={9} style={{padding:40,color:'#B3B3B3',fontSize:14}}>검색 결과가 없습니다.</td></tr>
          )}
        </tbody>
      </table>
    </div>
  );
}
