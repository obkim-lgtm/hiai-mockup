function Icon({name,size=20,color="currentColor",strokeWidth=2,style={}}){
  useEffect(()=>{ if(window.lucide) lucide.createIcons(); });

}

function hasBatchim(s){ if(!s) return false; const c = s[s.length-1].charCodeAt(0); return (c-0xAC00)%28!==0; }
function subj(name){ return hasBatchim(name) ? name+"이는" : name+"는"; }
function poss(name){ return hasBatchim(name) ? name+"이의" : name+"의"; }
function nick(name){ return hasBatchim(name) ? name+"이" : name; }
function subjNick(name){ return nick(name) + "가"; } // 하나가 / 서윤이가

function PrintModal({onClose, onApplyCompare, currentCompare}){
  const [opts, setOpts] = useState({ cover:true, highlight:true, trend:true, note:true, compareLine:currentCompare!=="none" });
  function handlePrint(){
    const b = document.body;
    b.dataset.inclCover     = opts.cover;
    b.dataset.inclHighlight = opts.highlight;
    b.dataset.inclTrend     = opts.trend;
    b.dataset.inclNote      = opts.note;
    // 비교선 옵션은 compare state로 제어
    if(!opts.compareLine) onApplyCompare("none");
    onClose();
    setTimeout(()=>window.print(), 200);
  }
  const rows = [
    ["cover",     "표지 · 인사말"],
    ["highlight", `잘한 점 · 키워볼 부분`],

              </div>
              <div style={{fontSize:16,color:"#494949",lineHeight:1.7}}>
                한 학기 동안 꾸준히 글쓰기에 참여하며, <b style={{color:"#7E44FB"}}>자료를 풍부하게 활용하는 강점</b>을 보였어요.
                이번 리포트에는 그동안 잘한 점과 앞으로 더 키워볼 부분을 정리했어요.
              </div>
              <div style={{display:"flex",gap:8,marginTop:16,flexWrap:"wrap"}}>
                {STUDENT.tags.map(t=>{
                  const isStrong = t.type==="strong";
                  return (
                    <span key={t.text} style={{display:"inline-flex",alignItems:"center",gap:5,height:30,padding:"0 14px",borderRadius:100,fontSize:14,fontWeight:800,
                      background:isStrong?"#F1F9F3":"#FFF1E5",color:isStrong?"#00AF3D":"#FF8C4C"}}>
                      <span style={{fontSize:10}}>{isStrong?"▲":"◆"}</span>{t.text}
                    </span>
                  );
                })}
              </div>
            </div>
          </div>

          {/* ②③ 잘한 점 / 키워볼 부분 */}
          <div className="sec-highlight" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
            <div className="panel" style={{padding:22,background:"linear-gradient(180deg,#F1F9F3 0%,#fff 55%)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                <div style={{width:32,height:32,borderRadius:8,background:"#00AF3D",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>
                  <Icon name="thumbs-up" size={18}/>
                </div>
                <div style={{fontSize:17,fontWeight:900,color:"#00AF3D"}}>{poss(STUDENT.name)} 잘한 점</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {STUDENT.strengths.map((s,i)=>(
                  <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <div style={{minWidth:22,height:22,borderRadius:"50%",background:"#00AF3D",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:800,color:"#222",lineHeight:1.55}}>{s.text}</div>
                      <div style={{fontSize:12,color:"#808080",marginTop:4,display:"flex",alignItems:"center",gap:4}}>
                        <Icon name="quote" size={11} color="#B3B3B3"/>{s.evidence}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="panel" style={{padding:22,background:"linear-gradient(180deg,#F2F7FF 0%,#fff 55%)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                <div style={{width:32,height:32,borderRadius:8,background:"#5890FF",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>
                  <Icon name="sprout" size={18}/>
                </div>
                <div style={{fontSize:17,fontWeight:900,color:"#5890FF"}}>{subjNick(STUDENT.name)} 더 키워볼 부분</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {STUDENT.growthAreas.map((g,i)=>(
                  <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <div style={{minWidth:22,height:22,borderRadius:"50%",background:"#5890FF",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:800,color:"#222",lineHeight:1.55}}>{g.text}</div>
                      <div style={{fontSize:13,color:"#494949",marginTop:6,lineHeight:1.6,background:"#fff",border:"1px solid #DDE7FB",borderRadius:8,padding:"8px 10px"}}>
                        <b style={{color:"#5890FF"}}>💡 이렇게 해봐요</b> — {g.how}
                      </div>
                      <div style={{fontSize:12,color:"#808080",marginTop:4,display:"flex",alignItems:"center",gap:4}}>
                        <Icon name="quote" size={11} color="#B3B3B3"/>{g.evidence}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ④ 성장 흐름 */}
          <div className="panel sec-trend" style={{padding:24,marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{fontSize:17,fontWeight:900,color:"#341761",display:"flex",alignItems:"center",gap:8}}>
                  <Icon name="trending-up" size={20} color="#7E44FB"/> {poss(STUDENT.name)} 성장 흐름
                </div>
                <div style={{fontSize:13,color:"#808080",marginTop:4}}>과제별 점수 변화와 선생님의 한마디예요</div>
              </div>
              <div className="no-print" style={{display:"flex",gap:6}}>
                <button className={"btn-out"+(compare==="cls"?" on":"")}   onClick={()=>setCompare("cls")}>반 평균</button>
                <button className={"btn-out"+(compare==="grade"?" on":"")} onClick={()=>setCompare("grade")}>학년 평균</button>
                <button className={"btn-out"+(compare==="none"?" on":"")}  onClick={()=>setCompare("none")}>비교 없음</button>
              </div>
            </div>
            <div style={{height:220}}>
              <ResponsiveContainer width="100%" height="100%">
                <LineChart data={TREND} margin={{top:10,right:20,left:0,bottom:0}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#EEE"/>
                  <XAxis dataKey="name" tick={{fontSize:12,fill:"#494949"}}/>
                  <YAxis domain={[0,100]} tick={{fontSize:12,fill:"#808080"}}/>
                  <Tooltip/>
                  <Legend wrapperStyle={{fontSize:12}}/>
                  <Line type="monotone" dataKey="me" stroke="#7E44FB" strokeWidth={3} dot={{r:5}} name={STUDENT.name}/>
                  {compare==="cls"   && <Line type="monotone" dataKey="cls"   stroke="#B3B3B3" strokeDasharray="5 4" name="반 평균"/>}
                  {compare==="grade" && <Line type="monotone" dataKey="grade" stroke="#5890FF" strokeDasharray="5 4" name="학년 평균"/>}
                </LineChart>
              </ResponsiveContainer>
            </div>

            {/* 편집 가능한 내러티브 */}
            <div style={{marginTop:14,padding:"14px 16px",background:"#F8F6FF",borderRadius:10,borderLeft:"4px solid #7E44FB",position:"relative"}}>
              {editing==="growth" ? (
                <div>
                  <textarea value={growthText} onChange={e=>setGrowthText(e.target.value)}
                    style={{width:"100%",minHeight:90,fontFamily:"inherit",fontSize:14,lineHeight:1.7,padding:10,border:"1px solid #D9D9D9",borderRadius:8,resize:"vertical",background:"#fff"}}/>
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:10}}>
                    <button className="btn-out" onClick={()=>setEditing(null)}>취소</button>
                    <button className="btn-pri" onClick={()=>setEditing(null)}>저장</button>
                  </div>
                </div>
              ) : (
                <>
                  <div style={{fontSize:14,lineHeight:1.75,color:"#333",paddingRight:80}}>{growthText}</div>
                  <button className="btn-ghost no-print" onClick={()=>setEditing("growth")} style={{position:"absolute",top:10,right:10}}>
                    <Icon name="pencil" size={13}/> 편집
                  </button>
                </>
              )}
            </div>
          </div>

          {/* ⑤ 선생님 한마디 */}
          <div className="panel sec-note" style={{padding:24,marginBottom:16,background:"linear-gradient(180deg,#FFFDF5 0%,#fff 45%)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{width:32,height:32,borderRadius:8,background:"#FF8C4C",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>
                <Icon name="message-circle-heart" size={18}/>
              </div>
              <div style={{fontSize:17,fontWeight:900,color:"#FF8C4C"}}>선생님 한마디</div>
              <span className="no-print" style={{fontSize:11,color:"#808080",fontWeight:700,background:"#F0F0F0",padding:"2px 8px",borderRadius:4}}>AI 초안 · 편집 가능</span>
            </div>
            {editing==="note" ? (
              <div>
                <textarea value={noteText} onChange={e=>setNoteText(e.target.value)}
                  style={{width:"100%",minHeight:120,fontFamily:"inherit",fontSize:15,lineHeight:1.75,padding:12,border:"1px solid #D9D9D9",borderRadius:8,resize:"vertical"}}/>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:10}}>
                  <button className="btn-out" onClick={()=>setEditing(null)}>취소</button>
                  <button className="btn-pri" onClick={()=>setEditing(null)}>저장</button>
                </div>
              </div>
            ) : (
              <div style={{position:"relative",padding:"4px 0"}}>
                <div style={{fontSize:15,lineHeight:1.85,color:"#333",whiteSpace:"pre-wrap",paddingRight:70}}>{noteText}</div>
                <button className="btn-ghost no-print" onClick={()=>setEditing("note")} style={{position:"absolute",top:0,right:0}}>
                  <Icon name="pencil" size={13}/> 편집
                </button>
              </div>
            )}
          </div>

          {/* ═══════════════ 교사 전용 (PDF 제외) ═══════════════ */}
          <TeacherOnlyDetails assignments={ASSIGNMENTS}/>

          <div style={{height:24}}/>
        </div>
        <div style={{height:48}}/>
       </div>
      </div>

      {printOpen && <PrintModal onClose={()=>setPrintOpen(false)} onApplyCompare={setCompare} currentCompare={compare}/>}
      {seteukOpen && <SeteukModal onClose={()=>setSeteukOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
