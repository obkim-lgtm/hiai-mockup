/* ─── 헬퍼 ─── */
function getStudentData(selectedIds){
  return STUDENTS.map(s=>{
    const selected = ASSIGNMENTS.filter(a=>selectedIds.includes(a.id));
    const maxTotal = selected.reduce((sum,a)=>sum+a.max,0);
    const scored = selected.map(a=>{
      const idx = ASSIGNMENTS.findIndex(x=>x.id===a.id);
      return s.scores[idx];
    });
    const hasNull = scored.some(v=>v===null);
    const total = hasNull ? null : scored.reduce((s,v)=>s+v,0);
    const pct = (total!=null && maxTotal>0) ? total/maxTotal : null;
    let cluster = null;
    if(pct!==null){
      if(pct>=0.8) cluster="high";
      else if(pct>=0.6) cluster="mid";
      else cluster="low";
    }
    return {...s, total, maxTotal, pct, cluster, scored, hasNull};
  });
}

function buildHistData(studentData, assignmentId){
  const aIdx = ASSIGNMENTS.findIndex(a=>a.id===assignmentId);
  const aMax = ASSIGNMENTS[aIdx].max;
  void aIdx; // used below
  const buckets = Math.min(aMax,6);
  const size = aMax/buckets;
  const bins = Array.from({length:buckets},(_,i)=>{
    const lo=Math.round(i*size), hi=Math.round((i+1)*size);
    return {range:`${lo}–${hi}`, count:0, lo, hi};
  });
  studentData.forEach(s=>{
    const sc = s.scores[aIdx];
    if(sc===null) return;
    const bi = Math.min(Math.floor(sc/size), buckets-1);
    bins[bi].count++;
  });
  return bins;
}

function buildStackData(selectedIds, studentData){
  return selectedIds.map(aid=>{
    const a = ASSIGNMENTS.find(x=>x.id===aid);
    const aIdx = ASSIGNMENTS.findIndex(x=>x.id===aid);
    const high = studentData.filter(s=>s.scores[aIdx]!==null && s.scores[aIdx]/a.max>=0.8).length;
    const mid  = studentData.filter(s=>s.scores[aIdx]!==null && s.scores[aIdx]/a.max>=0.6 && s.scores[aIdx]/a.max<0.8).length;
    const low  = studentData.filter(s=>s.scores[aIdx]!==null && s.scores[aIdx]/a.max<0.6).length;
    return {name:axisLabel(aIdx), title:a.title, high, mid, low};
  });
}

/* ─── 군집 카드 ─── */
function ClusterCard({cluster, students, selectedIds, aiStatus}){
  const [open, setOpen] = useState(false);

  const count = students.length;
  const total = STUDENTS.length;
  const avgPct = count>0 ? Math.round(students.reduce((s,st)=>s+(st.pct||0),0)/count*100) : 0;

  const maxScore = count>0 ? students[0]?.maxTotal : 0;

  /* 미니 분포: 선택 과제별 평균 */

    const aIdx = ASSIGNMENTS.findIndex(x=>x.id===aid);
    const vals = students.map(s=>s.scores[aIdx]).filter(v=>v!==null);
    const avg = vals.length>0 ? vals.reduce((s,v)=>s+v,0)/vals.length : 0;
    return {title:a.title, label:axisLabel(aIdx), avg:parseFloat(avg.toFixed(1)), max:a.max};
  });

  return (
    <div className="cluster-card">
      {/* 헤더 */}
      <div style={{background:cluster.bg,padding:"18px 20px",borderBottom:`2px solid ${cluster.color}`}}>

            <span style={{fontSize:18,fontWeight:900,color:"#222"}}>{cluster.label}</span>
          </div>
          <span style={{fontSize:14,color:cluster.color,fontWeight:900,background:"#fff",padding:"4px 12px",borderRadius:100,border:`1px solid ${cluster.color}`}}>
            {count}명 · {Math.round(count/total*100)}%
          </span>
        </div>
        <div style={{display:"flex",gap:24}}>
          <div><div style={{fontSize:13,color:"#808080",fontWeight:800}}>그룹 평균</div>
            <div style={{fontSize:24,fontWeight:900,color:cluster.color}}>{avgScore}<span style={{fontSize:14,color:"#B3B3B3"}}> / {maxScore}점</span></div>
          </div>
          <div><div style={{fontSize:13,color:"#808080",fontWeight:800}}>달성률</div>
            <div style={{fontSize:24,fontWeight:900,color:cluster.color}}>{avgPct}<span style={{fontSize:14,color:"#B3B3B3"}}>%</span></div>
          </div>
        </div>
      </div>

      <div style={{padding:"16px 20px"}}>
        {/* 과제별 평균 미니바 */}
        {count>0 && (
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,color:"#808080",fontWeight:800,marginBottom:10}}>과제별 그룹 평균</div>
            {miniData.map((d,i)=>(
              <div key={i} style={{marginBottom:12}}>
                {/* 과제명 — 전체 너비, 말줄임 + 툴팁 */}
                <div title={d.title} style={{fontSize:14,color:"#494949",fontWeight:700,marginBottom:5,
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%",
                  display:"flex",alignItems:"center",gap:5}}>
                  <span style={{flexShrink:0,color:"#B3B3B3"}}>{d.label}</span>
                  <span style={{color:"#D9D9D9"}}>·</span>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.title}</span>
                </div>
                {/* 바 + 점수 */}

                    <span style={{fontSize:13,color:"#808080"}}>{s.cls}</span>
                    <span style={{fontSize:15,fontWeight:800}}>{s.name}</span>
                    {s.hasNull && <span style={{fontSize:12,background:"#FFEFEF",color:"#DB3E51",padding:"2px 6px",borderRadius:4,fontWeight:800}}>미제출</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:14}}>
                    <span style={{fontSize:15,fontWeight:900,color:cluster.color}}>
                      {s.total!=null ? `${s.total}점` : "-"}
                      <span style={{fontSize:12,color:"#B3B3B3",fontWeight:700}}> / {s.maxTotal}</span>
                    </span>
                    <a href={`student_report_v1.html?id=${s.id}&name=${encodeURIComponent(s.name)}&cls=${s.cls}`} className="report-link">상세 ›</a>
                  </div>
                </div>
              ))
            }
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── 학생 리포트 리스트 뷰 ─── */
function StudentListView({selectedClass, setSelectedClass}){
  const classes = ["all", ...Array.from(new Set(STUDENTS.map(s=>s.cls)))];
  const maxTotal = ASSIGNMENTS.reduce((s,a)=>s+a.max, 0);

  /* 학생별 총점·달성률·상태 계산 (전체 과제 기준) */
  const rows = STUDENTS
    .filter(s=>selectedClass==="all" || s.cls===selectedClass)
    .map(s=>{
      const scores = s.scores;
      const submitted = scores.filter(v=>v!=null);
      const total = submitted.reduce((x,y)=>x+y,0);
      const missing = scores.length - submitted.length;
      const pct = Math.round(total/maxTotal*100);
      let cluster = pct>=80 ? "high" : pct>=60 ? "mid" : "low";
      return {...s, total, missing, pct, cluster};
    })
    .sort((a,b)=> a.cls.localeCompare(b.cls) || a.id.localeCompare(b.id));

  const clusterMeta = {
    high:{label:"목표 달성", color:"#00AF3D", bg:"#F1F9F3"},
    mid: {label:"성장 중",   color:"#7E44FB", bg:"#F7F4FF"},
    low: {label:"집중 지원", color:"#FF8C4C", bg:"#FFF8F3"},
  };

  return (
    <div>
      {/* 필터바 */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <span style={{fontSize:15,fontWeight:900,color:"#341761"}}>학급</span>
        <div style={{display:"flex",gap:6}}>
          {classes.map(c=>(
            <button key={c}
              onClick={()=>setSelectedClass(c)}
              className={selectedClass===c?"chip-on":"chip-off"}>
              {c==="all"?"전체":c}
            </button>
          ))}
        </div>
        <span style={{fontSize:14,color:"#808080",marginLeft:"auto"}}>
          총 <b style={{color:"#7E44FB"}}>{rows.length}</b>명
        </span>
      </div>

      {/* 테이블 */}
      <div style={{border:"1px solid #E6E6E6",borderRadius:12,overflow:"hidden"}}>
        {/* 헤더 */}
        <div style={{display:"grid",gridTemplateColumns:"80px 80px 1fr 1fr 140px 120px 80px",
          background:"#F8F8F8",padding:"12px 16px",fontSize:14,fontWeight:800,color:"#494949",borderBottom:"1px solid #E6E6E6"}}>
          <div>학급</div>
          <div>학번</div>
          <div>이름</div>
          <div>총점</div>
          <div>달성률</div>
          <div>상태</div>
          <div style={{textAlign:"right"}}>리포트</div>
        </div>
        {/* 행 */}
        {rows.length===0
          ? <div style={{padding:"40px",textAlign:"center",color:"#B3B3B3",fontSize:15}}>해당 학급에 학생이 없습니다.</div>
          : rows.map(r=>{
              const meta = clusterMeta[r.cluster];
              return (
                <div key={r.id} style={{display:"grid",gridTemplateColumns:"80px 80px 1fr 1fr 140px 120px 80px",
                  padding:"14px 16px",alignItems:"center",borderBottom:"1px solid #F0F0F0",fontSize:15}}>
                  <div style={{color:"#808080"}}>{r.cls}</div>
                  <div style={{color:"#808080"}}>{r.id}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:800}}>{r.name}</span>
                    {r.missing>0 && <span style={{fontSize:12,background:"#FFEFEF",color:"#DB3E51",padding:"2px 6px",borderRadius:4,fontWeight:800}}>미제출 {r.missing}</span>}
                  </div>
                  <div style={{fontWeight:900,color:meta.color}}>
                    {r.total}<span style={{color:"#B3B3B3",fontWeight:700,fontSize:13}}> / {maxTotal}점</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1,height:8,background:"#F0F0F0",borderRadius:999,overflow:"hidden",maxWidth:100}}>
                      <div style={{height:"100%",width:`${Math.min(r.pct,100)}%`,background:meta.color,borderRadius:999}}/>
                    </div>
                    <span style={{fontSize:14,fontWeight:900,color:meta.color,minWidth:36}}>{r.pct}%</span>
                  </div>
                  <div>
                    <span style={{fontSize:13,fontWeight:800,color:meta.color,background:meta.bg,padding:"4px 10px",borderRadius:100}}>
                      {meta.label}
                    </span>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <a href={`student_report_v1.html?id=${r.id}&name=${encodeURIComponent(r.name)}&cls=${r.cls}`} style={{color:"#7E44FB",fontWeight:800,fontSize:14,textDecoration:"none"}}>상세 ›</a>
                  </div>
                </div>
              );
            })
        }
      </div>
    </div>
  );
}

/* ─── 분포 차트 ─── */
function DistributionChart({selectedIds, studentData}){
  const isSingle = selectedIds.length===1;

  if(isSingle){
    const data = buildHistData(studentData, selectedIds[0]);
    const a = ASSIGNMENTS.find(x=>x.id===selectedIds[0]);
    const aIdx = ASSIGNMENTS.findIndex(x=>x.id===selectedIds[0]);
    return (
      <div>
        <div title={a.title} style={{fontSize:14,color:"#808080",fontWeight:800,marginBottom:10,
          whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>
          {axisLabel(aIdx)} · {a.title} 점수 분포
        </div>
        <ResponsiveContainer width="100%" height={180}>
          <BarChart data={data} margin={{top:4,right:4,left:-20,bottom:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" vertical={false}/>
            <XAxis dataKey="range" tick={{fontSize:13,fill:"#808080"}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fontSize:12,fill:"#B3B3B3"}} axisLine={false} tickLine={false}/>
            <Tooltip contentStyle={{fontSize:13}} formatter={v=>[`${v}명`,"인원"]}/>
            <Bar dataKey="count" radius={[4,4,0,0]} maxBarSize={40}>
              {data.map((d,i)=>{
                const mid = (d.lo+d.hi)/2;
                const pct = mid/a.max;
                const fill = pct>=0.8?"#00AF3D":pct>=0.6?"#7E44FB":"#FF8C4C";
                return <Cell key={i} fill={fill}/>;
              })}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
        <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:4}}>
          {[{c:"#00AF3D",l:"목표 달성 (80%↑)"},{c:"#7E44FB",l:"성장 중 (60~80%)"},{c:"#FF8C4C",l:"집중 지원 필요 (60%↓)"}].map(x=>(
            <div key={x.l} style={{display:"flex",alignItems:"center",gap:5,fontSize:13}}>
              <div style={{width:8,height:8,borderRadius:2,background:x.c}}/>
              <span style={{color:"#808080"}}>{x.l}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* 복수 선택: 과제별 군집 구성 스택 바 */
  const data = buildStackData(selectedIds, studentData);
  return (
    <div>
      <div style={{fontSize:14,color:"#808080",fontWeight:800,marginBottom:10}}>과제별 군집 구성 변화</div>
      <ResponsiveContainer width="100%" height={180}>
        <BarChart data={data} margin={{top:4,right:4,left:-20,bottom:0}}>
          <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" vertical={false}/>
          <XAxis dataKey="name" tick={{fontSize:13,fill:"#494949"}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fontSize:12,fill:"#B3B3B3"}} axisLine={false} tickLine={false}/>
          <Tooltip contentStyle={{fontSize:13}} formatter={(v,n)=>[`${v}명`, n==="high"?"목표 달성":n==="mid"?"성장 중":"집중 지원 필요"]}/>
          <Bar dataKey="high" stackId="a" fill="#00AF3D" name="high" radius={[0,0,0,0]}/>
          <Bar dataKey="mid"  stackId="a" fill="#7E44FB" name="mid"/>
          <Bar dataKey="low"  stackId="a" fill="#FF8C4C" name="low" radius={[4,4,0,0]}/>
        </BarChart>
      </ResponsiveContainer>
      <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:4}}>
        {[{c:"#00AF3D",l:"목표 달성"},{c:"#7E44FB",l:"성장 중"},{c:"#FF8C4C",l:"집중 지원 필요"}].map(x=>(
          <div key={x.l} style={{display:"flex",alignItems:"center",gap:5,fontSize:13}}>
            <div style={{width:8,height:8,borderRadius:2,background:x.c}}/>
            <span style={{color:"#808080"}}>{x.l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── 메인 ─── */
function App(){
  /* URL ?tab=student 이면 학생 리포트로 진입 */
  const initialTab = (typeof window!=="undefined" && new URLSearchParams(window.location.search).get("tab")==="student") ? "student" : "class";
  const [subTab, setSubTab] = useState(initialTab);
  /* 전체는 수백명 될 수 있어 기본은 첫 학급 */
  const firstClass = STUDENTS[0]?.cls || "all";
  const [selectedClass, setSelectedClass] = useState(firstClass);
  const [selectedIds, setSelectedIds] = useState(["a1","a2","a3"]);

  /* AI 그룹 분석 상태: idle(최초) | generating | done | stale(변경감지) */
  const [aiStatus, setAiStatus] = useState("idle");
  const [aiGeneratedAt, setAiGeneratedAt] = useState(null);
  const [aiGeneratedKey, setAiGeneratedKey] = useState(null); // 생성 시점의 범위 스냅샷

  const currentKey = selectedIds.slice().sort().join(",");
  /* 범위 바뀌면 stale로 (단, 생성된 적 있을 때만) */
  useEffect(()=>{
    if(aiStatus==="done" && aiGeneratedKey && aiGeneratedKey!==currentKey){
      setAiStatus("stale");
    }
  },[currentKey]);

  function handleGenerateAi(){
    setAiStatus("generating");
    setTimeout(()=>{
      const now = new Date();
      const fmt = `${String(now.getMonth()+1).padStart(2,"0")}/${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
      setAiGeneratedAt(fmt);
      setAiGeneratedKey(currentKey);
      setAiStatus("done");
    }, 2200);
  }

  function toggleAssignment(id){
    setSelectedIds(prev=>{
      if(prev.includes(id)){
        if(prev.length===1) return prev; // 최소 1개
        return prev.filter(x=>x!==id);
      }
      return [...prev, id];
    });
  }

  function selectAll(){
    setSelectedIds(ASSIGNMENTS.map(a=>a.id));
  }

  const studentData = useMemo(()=>getStudentData(selectedIds),[selectedIds]);

  const clusterGroups = useMemo(()=>{
    const result={};
    CLUSTERS.forEach(c=>{ result[c.key]=studentData.filter(s=>s.cluster===c.key); });
    return result;
  },[studentData]);

  return (
    <div style={{minHeight:"100vh"}}>
      <GNB/>
      <TitleBar/>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"40px 36px",minHeight:760}}>
        <div style={{width:"100%",maxWidth:1200}}>
          <Tabs/>
          <div style={{background:"#fff",borderRadius:"0 0 20px 20px",padding:"28px 24px",boxShadow:"0 4px 36px rgba(95,102,178,0.16)"}}>

            {/* 패널 헤더 */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div>
                <div style={{fontSize:24,fontWeight:700,color:"#333"}}>평가 리포트</div>
                <div style={{fontSize:16,fontWeight:400,color:"#333",lineHeight:1.55,marginTop:8}}>수업 단위 종합 현황과 학생별 리포트를 확인할 수 있습니다.</div>
              </div>
              <button className="btn-pri"><Icon name="download" size={20} color="#fff"/>점수 다운로드</button>
            </div>

            {/* 서브탭 */}
            <div style={{display:"flex",gap:4,borderBottom:"2px solid #7E44FB",marginBottom:24}}>
              <button className={subTab==="class"?"sub-tab-on":"sub-tab-off"} onClick={()=>setSubTab("class")}>수업 리포트</button>
              <button className={subTab==="student"?"sub-tab-on":"sub-tab-off"} onClick={()=>setSubTab("student")}>학생 리포트</button>
            </div>

            {subTab==="student" && <StudentListView selectedClass={selectedClass} setSelectedClass={setSelectedClass}/>}

            {subTab==="class" && (<>
              {/* 평가 범위 선택 */}
              <div style={{background:"#F8F8F8",borderRadius:12,padding:"18px 22px",marginBottom:24}}>
                <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                  <span style={{fontSize:15,fontWeight:900,color:"#341761",flexShrink:0}}>평가 범위</span>
                  <button className={selectedIds.length===ASSIGNMENTS.length?"chip-on":"chip-off"} onClick={selectAll}>
                    전체 평가
                  </button>
                  <div style={{width:1,height:22,background:"#D9D9D9"}}/>
                  {ASSIGNMENTS.map((a,i)=>{
                    const isOn = selectedIds.includes(a.id)&&selectedIds.length<ASSIGNMENTS.length;
                    return (
                      <button key={a.id} title={a.title}
                        className={isOn?"chip-on":"chip-off"}
                        onClick={()=>toggleAssignment(a.id)}
                        style={{maxWidth:200,overflow:"hidden"}}>
                        {isOn && <span style={{marginRight:4,flexShrink:0}}>✓</span>}
                        <span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"block"}}>
                          {axisLabel(i)} · {a.title}
                        </span>
                      </button>
                    );
                  })}
                  <span style={{fontSize:13,color:"#B3B3B3",marginLeft:4}}>복수 선택 가능</span>
                </div>
                <div style={{marginTop:12,fontSize:14,color:"#808080"}}>
                  선택됨: <b style={{color:"#7E44FB"}}>{selectedIds.length===ASSIGNMENTS.length?"전체 과제 (3개)":ASSIGNMENTS.filter((a,i)=>selectedIds.includes(a.id)).map((a,_,arr,i)=>axisLabel(ASSIGNMENTS.indexOf(a))).join(", ")}</b>
                  &nbsp;·&nbsp; 기준 만점: <b>{studentData[0]?.maxTotal||0}점</b>
                  &nbsp;·&nbsp; 군집 기준: 달성률 80%↑ / 60~80% / 60%↓
                </div>
              </div>

              {/* 분포 차트 + 요약 KPI */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:16,marginBottom:24}}>
                <div style={{background:"#F8F8F8",borderRadius:12,padding:"20px 22px"}}>
                  <div style={{fontSize:18,fontWeight:900,color:"#341761",marginBottom:14}}>
                    {selectedIds.length===1?"점수 분포":"과제별 군집 구성 변화"}
                  </div>
                  <DistributionChart selectedIds={selectedIds} studentData={studentData}/>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {CLUSTERS.map(c=>{
                    const cnt=clusterGroups[c.key]?.length||0;
                    return (
                      <div key={c.key} style={{background:c.bg,borderRadius:12,padding:"16px 18px",flex:1,display:"flex",alignItems:"center",gap:14}}>
                        <span style={{fontSize:24}}>{c.icon}</span>
                        <div>
                          <div style={{fontSize:14,fontWeight:800,color:"#808080"}}>{c.label}</div>
                          <div style={{fontSize:24,fontWeight:900,color:c.color}}>
                            {cnt}<span style={{fontSize:14,color:"#B3B3B3",fontWeight:700}}>명</span>
                            <span style={{fontSize:14,color:c.color,fontWeight:700,marginLeft:6}}>{Math.round(cnt/STUDENTS.length*100)}%</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* AI 그룹 분석 컨트롤 바 */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                background:aiStatus==="stale"?"#FFF8F3":"#F8F8F8",
                border:aiStatus==="stale"?"1px solid #FFD5B3":"1px solid #E6E6E6",
                borderRadius:12,padding:"14px 18px",marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:18}}>🧠</span>
                  <div>
                    <div style={{fontSize:15,fontWeight:900,color:"#341761"}}>AI 그룹 코멘트 생성</div>
                    <div style={{fontSize:13,color:"#808080",marginTop:2,lineHeight:1.5}}>
                      {aiStatus==="idle"   && <>군집 구성·평균·과제별 점수는 점수 기반이라 즉시 표시됩니다.<br/>AI는 그룹별 공통 패턴과 지도 제안 문장만 생성합니다. (약 3~5분 소요)</>}
                      {aiStatus==="generating" && "AI가 3개 군집의 공통 패턴과 지도 제안을 생성 중입니다…"}
                      {aiStatus==="done"   && <>마지막 생성: <b style={{color:"#494949"}}>{aiGeneratedAt}</b> · 현재 범위 기준 최신 상태입니다.</>}
                      {aiStatus==="stale"  && <>마지막 생성: <b style={{color:"#494949"}}>{aiGeneratedAt}</b> · 평가 범위가 바뀌어 결과가 현재 선택과 일치하지 않습니다.</>}
                    </div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  {aiStatus==="stale" && (
                    <span style={{fontSize:12,fontWeight:800,color:"#FF8C4C",background:"#FFE8D6",padding:"4px 10px",borderRadius:100}}>업데이트 필요</span>
                  )}
                  {aiStatus==="idle"       && <button className="btn-pri" onClick={handleGenerateAi}><Icon name="wand-sparkles" size={16}/>AI 코멘트 생성하기</button>}
                  {aiStatus==="generating" && <button className="btn-pri" disabled style={{opacity:0.6,cursor:"default"}}><Icon name="wand-sparkles" size={16}/>분석 중…</button>}
                  {aiStatus==="done"       && <button className="btn-out" onClick={handleGenerateAi}><Icon name="wand-sparkles" size={16}/>다시 생성</button>}
                  {aiStatus==="stale"      && <button className="btn-pri" onClick={handleGenerateAi}><Icon name="wand-sparkles" size={16}/>업데이트</button>}
                </div>
              </div>

              {/* 군집 카드 3개 */}
              <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                {CLUSTERS.map(c=>(
                  <ClusterCard key={c.key} cluster={c} students={clusterGroups[c.key]||[]} selectedIds={selectedIds} aiStatus={aiStatus}/>
                ))}
              </div>
            </>)}

          </div>
        </div>
        <div style={{height:48}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
